<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Love Calculator ❤️</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ff4b91,#ff7eb3);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:400px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    color:#ff2d75;
}

input{
    width:90%;
    padding:12px;
    margin:10px 0;
    border:2px solid #ff4b91;
    border-radius:10px;
    font-size:16px;
}

button{
    background:#ff2d75;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
}

button:hover{
    transform:scale(1.05);
}

#result{
    margin-top:20px;
    font-size:28px;
    font-weight:bold;
    color:#ff2d75;
}

#message{
    margin-top:10px;
    font-size:18px;
}
</style>

</head>

<body>

<div class="container">
    <h1>❤️ Love Calculator ❤️</h1>

```
<input type="text" id="name1" placeholder="Your Name">

<input type="text" id="name2" placeholder="Partner Name">

<br><br>

<button onclick="calculateLove()">Calculate Love</button>

<div id="result"></div>
<div id="message"></div>
```

</div>

<script>
function calculateLove(){

    let name1 = document.getElementById("name1").value;
    let name2 = document.getElementById("name2").value;

    if(name1==="" || name2===""){
        alert("Please enter both names");
        return;
    }

    let love = Math.floor(Math.random()*41)+60;

    document.getElementById("result").innerHTML =
    "❤️ " + love + "% Match ❤️";

    if(love > 90){
        document.getElementById("message").innerHTML =
        "Perfect Match! 💍";
    }
    else if(love > 75){
        document.getElementById("message").innerHTML =
        "Great Chemistry! ❤️";
    }
    else{
        document.getElementById("message").innerHTML =
        "Friendship se start karo 😄";
    }
}
</script>

</body>
</html>
