<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rahul's Git Page</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(-45deg,#0f172a,#1e293b,#2563eb,#06b6d4);
        background-size:400% 400%;
        animation:bg 8s ease infinite;
        overflow:hidden;
    }

    @keyframes bg{
        0%{background-position:0% 50%;}
        50%{background-position:100% 50%;}
        100%{background-position:0% 50%;}
    }

    .card{
        text-align:center;
        color:white;
        padding:40px;
        border-radius:20px;
        backdrop-filter:blur(10px);
        background:rgba(255,255,255,0.1);
        box-shadow:0 0 30px rgba(255,255,255,0.2);
    }

    h1{
        font-size:60px;
        animation:glow 2s infinite alternate;
    }

    @keyframes glow{
        from{
            text-shadow:0 0 10px #fff;
        }
        to{
            text-shadow:0 0 30px #00ffff,
                        0 0 50px #00ffff;
        }
    }

    p{
        margin-top:15px;
        font-size:22px;
    }

    button{
        margin-top:25px;
        padding:12px 25px;
        border:none;
        border-radius:30px;
        font-size:18px;
        cursor:pointer;
        transition:.3s;
    }

    button:hover{
        transform:scale(1.1);
    }
</style>
</head>

<body>

<div class="card">
    <h1>🚀 Welcome Rahul 🚀</h1>
    <p>Git & GitHub Journey Begins!</p>
    <button onclick="showMessage()">Click Me</button>
</div>

<script>
function showMessage(){
    alert("🔥 Commit. Push. Repeat. Future Cloud Engineer! 🔥");
}
</script>

</body>
</html>
